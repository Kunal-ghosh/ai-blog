
name: Auto Generate AI Blog Post

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Setup Git identity
        run: |
          git config --global user.name "Kunal-ghosh"
          git config --global user.email "kunalghosh5135@gmail.com"

      - name: Generate AI Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_MODEL: qwen/qwen3-4b:free
        run: node utils/generatePost.js

      - name: Show generated posts
        run: |
          echo "Files in pages/posts:"
          ls -la pages/posts

      - name: Print latest generated post
        run: |
          FILE=$(ls -t pages/posts/*.js | head -n1)
          echo "✅ Latest generated file: $FILE"
          echo "---- FILE CONTENT ----"
          cat "$FILE"
          echo "----------------------"

      - name: Commit generated post (to main)
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git add pages/posts
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add auto-generated post"
          # Use PAT token to allow triggering other workflows
          if [ -n "$PAT_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:$PAT_TOKEN@github.com/${{ github.repository }}.git"
          else
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi
          git push origin HEAD:main
          
      - name: Build with Next.js
        run: npm run build
      
      - name: Add .nojekyll file
        run: touch out/.nojekyll
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
